<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Brainstorming Ideas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/static/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div
      class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100"
    >
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-indigo-600 mb-2">Brainstorming</h1>
        <p class="text-slate-500">Gestión Inteligente de Ideas</p>
      </div>

      <form action="/login" method="POST" class="space-y-6">
        <div>
          <label
            for="password"
            class="block text-sm font-semibold text-slate-700 mb-2"
            >Contraseña de Administrador</label
          >
          <input
            type="password"
            id="password"
            name="password"
            required
            class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-lg outline-none"
            placeholder="••••••••"
          />
        </div>

        {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium">
          {{ error }}
        </div>
        {% endif %}

        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-lg active:scale-95"
        >
          Acceder al Panel
        </button>
      </form>
    </div>
  </body>
</html>
